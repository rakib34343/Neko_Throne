# ═══════════════════════════════════════════════════════════════════════════════
# Neko Throne CI/CD — amd64 only (Linux + Windows)
# ═══════════════════════════════════════════════════════════════════════════════
name: Neko Throne CI/CD (amd64)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Тег релиза и версия"
        required: false
        default: ""
      publish:
        description: "r — обычный релиз, p — предрелиз, пусто — не публиковать"
        required: false
  push:
    branches: ["**"]
    paths-ignore: ["**.md", LICENSE, "docs/**"]

env:
  QT_VERSION: "6.10.2"
  GO_VERSION: "1.25.8"
  CCACHE_MAXSIZE: 5G
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ═════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Линтер ───────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Линтер кода
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v6.0.2
        with: { submodules: recursive }
      - run: ./scripts/ci/lint.sh
      - uses: actions/upload-artifact@v7.0.0
        if: always()
        with: { name: lint-report, path: lint-report/, retention-days: 7 }

  # ─── Проверка Go-кода ─────────────────────────────────────────────────────
  lint-go:
    name: 🔍 Линтер Go
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v6.0.2
        with: { submodules: recursive }
      - name: 🛠️ Установка Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/server/go.sum
      - name: 🔧 Генерация protobuf кода
        run: |
          PROTOC_VER="31.1"
          curl -fLO --retry 3 "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VER}/protoc-${PROTOC_VER}-linux-x86_64.zip"
          unzip "protoc-${PROTOC_VER}-linux-x86_64.zip" -d /tmp/protoc_install
          sudo cp /tmp/protoc_install/bin/protoc /usr/local/bin/
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          cd core/server/gen
          protoc -I . --go_out=. --go-grpc_out=. libcore.proto
      - name: 🔍 go vet
        working-directory: core/server
        run: go vet ./...

  # ─── Сборка (Go + C++ в одном задании) ────────────────────────────────────
  build:
    name: "${{ matrix.os_label }}"
    permissions: { contents: read }
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: ubuntu-22.04,   os_label: linux,   cross_os: linux,   cross_arch: amd64 }
          - { platform: windows-latest, os_label: windows, cross_os: windows, cross_arch: amd64 }
    runs-on: ${{ matrix.platform }}
    env:
      INPUT_VERSION: ${{ github.event.inputs.tag }}

    steps:
      - uses: actions/checkout@v6.0.2
        with: { submodules: recursive }

      # ── Go бэкенд ──────────────────────────────────────────────────────
      - name: 📦 Кэш Go артефактов
        id: cache-go
        uses: actions/cache@v5.0.3
        with:
          path: go-artifacts.tgz
          key: go-${{ matrix.cross_os }}-${{ hashFiles('scripts/ci/build_go.sh', 'core/**') }}-${{ env.GO_VERSION }}

      - name: 🛠️ Установка Go
        if: steps.cache-go.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: core/server/go.sum

      - name: 🔨 Сборка Go бэкенда
        if: steps.cache-go.outputs.cache-hit != 'true'
        shell: bash
        env:
          GOOS: ${{ matrix.cross_os }}
          GOARCH: ${{ matrix.cross_arch }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PROTOC_VER="31.1"
            curl -fLO --retry 3 "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VER}/protoc-${PROTOC_VER}-win64.zip"
            unzip "protoc-${PROTOC_VER}-win64.zip" -d protoc_install
            export PATH="$PWD/protoc_install/bin:$PATH"
            echo "$PWD/protoc_install/bin" >> "$GITHUB_PATH"
          else
            ./scripts/ci/setup_go.sh
          fi
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          ./scripts/ci/build_go.sh
          tar czf go-artifacts.tgz ./deployment

      - name: 📂 Распаковка Go артефактов
        shell: bash
        run: |
          tar xzf go-artifacts.tgz
          ART="download-artifact/NekoThrone-go-${{ matrix.cross_os }}-${{ matrix.cross_arch }}"
          mkdir -p "$ART"
          cp go-artifacts.tgz "$ART/artifacts.tgz"

      # ── C++ инструментарий ─────────────────────────────────────────────
      - name: ⚙️ Установка MSVC
        if: matrix.os_label == 'windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with: { arch: x86_64 }

      - name: 📚 Установка зависимостей сборки
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq \
              ccache ninja-build \
              libx11-dev libx11-xcb-dev libxcb-cursor-dev \
              libxkbcommon-dev libxkbcommon-x11-dev \
              libgl1-mesa-dev \
              libdbus-1-dev \
              libwayland-dev \
              libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
              libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
              libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev
          else
            choco install ccache -y
          fi

      - name: 🗂️ Восстановление кэша ccache (Linux)
        if: matrix.os_label == 'linux'
        uses: actions/cache@v5.0.3
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.os_label }}-${{ hashFiles('src/**', 'include/**', 'CMakeLists.txt') }}
          restore-keys: ccache-${{ matrix.os_label }}-

      - name: 🗂️ Восстановление кэша ccache (Windows)
        if: matrix.os_label == 'windows'
        uses: actions/cache@v5.0.3
        with:
          path: ~/AppData/Local/ccache
          key: ccache-${{ matrix.os_label }}-${{ hashFiles('src/**', 'include/**', 'CMakeLists.txt') }}
          restore-keys: ccache-${{ matrix.os_label }}-

      # ── Qt (зависит от платформы) ──────────────────────────────────────
      - name: 🖼️ Установка Qt (Linux)
        if: matrix.os_label == 'linux'
        uses: jurplel/install-qt-action@v4.3.0
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
          cache-key-prefix: qt-linux

      - name: 🗂️ Кэш статического Qt (Windows)
        if: matrix.os_label == 'windows'
        id: cache-win-qt
        uses: actions/cache@v5.0.3
        with:
          path: qt6/build
          key: win-qt-static-${{ env.QT_VERSION }}-${{ hashFiles('script/build_qt_static_windows.bat') }}

      - name: 🔧 Сборка статического Qt (Windows)
        if: matrix.os_label == 'windows' && steps.cache-win-qt.outputs.cache-hit != 'true'
        shell: cmd
        run: call .\script\build_qt_static_windows.bat ${{ env.QT_VERSION }}

      # ── Конфигурация, сборка, деплой ──────────────────────────────────
      - name: 🏗️ Сборка Neko Throne
        shell: bash
        run: |
          mkdir -p build && cd build
          curl -fLso srslist.h "https://raw.githubusercontent.com/throneproj/routeprofiles/rule-set/srslist.h"

          CMAKE_ARGS=(
            -GNinja
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          )

          if [[ "${{ matrix.os_label }}" == "windows" ]]; then
            export CMAKE_PREFIX_PATH="$PWD/../qt6/build/lib/cmake"
          else
            CMAKE_ARGS+=(-DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++")
          fi

          cmake "${CMAKE_ARGS[@]}" ..
          ninja -j$(nproc 2>/dev/null || echo 4)
          cd ..

          if [[ "${{ matrix.os_label }}" == "windows" ]]; then
            ./script/deploy_windows.sh
          else
            ./script/deploy_linux64.sh
          fi

      - name: 📊 Статистика ccache
        if: always()
        shell: bash
        run: ccache -s

      - name: 📝 Итог сборки
        if: always()
        shell: bash
        run: |
          echo "### 🏗️ Сборка завершена: ${{ matrix.os_label }}" >> $GITHUB_STEP_SUMMARY
          echo "- Платформа: \`${{ matrix.platform }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Go версия: \`${{ env.GO_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Qt версия: \`${{ env.QT_VERSION }}\`" >> $GITHUB_STEP_SUMMARY

      # ── Загрузка артефактов ────────────────────────────────────────────
      - name: 📤 Загрузка артефактов
        uses: actions/upload-artifact@v7.0.0
        with:
          name: NekoThrone-${{ matrix.os_label }}-amd64
          path: deployment/
          retention-days: 30

  # ─── Публикация релиза ────────────────────────────────────────────────────
  release:
    name: 🚀 Публикация релиза
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: [build]
    permissions: { contents: write, actions: read }
    env:
      INPUT_VERSION: ${{ github.event.inputs.tag || format('0.5.0-nightly.{0}', github.run_number) }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/download-artifact@v8.0.1
        with: { path: download-artifact }
      - name: 📋 Определение режима публикации
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "PUBLISH_MODE=p" >> "$GITHUB_ENV"
          else
            echo "PUBLISH_MODE=${{ github.event.inputs.publish }}" >> "$GITHUB_ENV"
          fi
      - name: 📦 Упаковка и публикация
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/ci/release_pack.sh
      - uses: actions/upload-artifact@v7.0.0
        with: { name: debug-symbols, path: debug-symbols.zip }

      - name: 📝 Итог публикации
        if: always()
        run: |
          echo "### 🚀 Релиз: ${{ env.INPUT_VERSION }}" >> $GITHUB_STEP_SUMMARY
